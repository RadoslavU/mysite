{% load static %}
<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Радисън Строй ЕООД{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="brand">Радисън Строй ЕООД</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Начало</a>
                <a href="{% url 'about' %}">За нас</a>
                <a href="{% url 'contact' %}">Контакт</a>
                {% if request.user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}" class="logout-form">
                        {% csrf_token %}
                        <button type="submit">Изход</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Вход</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
